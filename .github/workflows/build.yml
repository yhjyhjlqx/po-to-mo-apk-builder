name: Build Pipeline
on: [repository_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/*.sh
      - run: ./scripts/android-setup.sh
      - run: ./scripts/build-apk.sh
      - uses: actions/upload-artifact@v3
        with:
          name: output
          path: |
            output.mo
            app-release.apk
